<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando...</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f172a;
  color: white;
  font-family: Arial;
  flex-direction: column;
}

/* ANIMAÇÃO DE LOADING */
.loader {
  width: 60px;
  height: 60px;
  border: 6px solid rgba(255,255,255,0.2);
  border-top: 6px solid #38bdf8;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

h2 {
  font-size: 18px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="loader"></div>
<h2>Carregando...</h2>

<script>
setTimeout(() => {
  window.location.href = "index.html";
}, 2500); // 2.5 segundos
</script>

</body>
</html>
